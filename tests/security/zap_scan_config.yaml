# OWASP ZAP API Scan Configuration
# Web Trading Platform - Security Testing
#
# Usage:
#   docker run -t ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
#     -t http://localhost:8000/openapi.json \
#     -f openapi \
#     -c tests/security/zap_scan_config.yaml
#
# Prerequisites:
#   1. API server running on localhost:8000
#   2. Docker installed
#   3. Valid test user credentials configured
#
# Scan Types:
#   - API Scan: Tests REST API endpoints for vulnerabilities
#   - Baseline Scan: Quick passive scan for common issues
#   - Full Scan: Active + passive testing (use in staging only)

# ============================================================
# ZAP API Scan Rules Configuration
# Format: <rule_id> <action> [<parameter>]
# Actions: IGNORE, WARN, FAIL
