# ============================================================
# Target API Endpoints for Trading Platform
# ============================================================
# POST /api/auth/login        - Authentication endpoint
# POST /api/auth/register     - User registration
# POST /api/auth/refresh      - Token refresh
# GET  /api/dashboard/*       - Dashboard data
# POST /api/orders            - Order placement
# GET  /api/positions         - Position viewing
# POST /api/killswitch        - Kill switch activation
# WS   /ws/market-data        - WebSocket market feed
# GET  /admin/*               - Admin panel endpoints

# ============================================================
# Authentication Configuration for ZAP
# ============================================================
# To authenticate ZAP for testing protected endpoints:
#
# 1. Set environment variables:
#    ZAP_AUTH_HEADER=Authorization
#    ZAP_AUTH_HEADER_VALUE=Bearer <test_token>
#
# 2. Or use ZAP's built-in authentication:
#    - Method: JSON-based authentication
#    - Login URL: http://localhost:8000/api/auth/login
#    - Login Body: {"email": "test@example.com", "password": "TestPass123!"}
#    - Token extraction: $.access_token
#    - Header: Authorization: Bearer {token}
#
# 3. Session management:
#    - Type: Cookie/Header-based
#    - Logged-in indicator: HTTP 200 on /api/dashboard/summary
#    - Logged-out indicator: HTTP 401

# ============================================================
# CI/CD Integration
# ============================================================
# GitHub Actions example:
#
# - name: OWASP ZAP API Scan
#   uses: zaproxy/action-api-scan@v0.7.0
#   with:
#     target: 'http://localhost:8000/openapi.json'
#     rules_file_name: 'tests/security/zap_scan_config.yaml'
#     cmd_options: '-f openapi'
#     fail_action: true
